name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "1.3.14"
  # Point config resolution at the minimal example config so tests
  # that fall back to filesystem config discovery have a deterministic target.
  HOTDOG_CONFIG_DIR: "./examples/minimal-config/config"

jobs:
  test:
    name: "bun test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: "Setup bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: "Run tests"
        run: bun test

      - name: "Run tests with coverage"
        run: bun test --coverage
        continue-on-error: true
